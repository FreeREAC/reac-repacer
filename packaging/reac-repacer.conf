# reac-repacer — REAC Wi-Fi de-jitter re-pacer.
# REPACER_ARGS: one or more --port INGRESS:EGRESS pairs + options. The repacer
# reads REAC on INGRESS, de-jitters, and re-clocks it out EGRESS.
#   e.g. "--port reac-in:reac-out --prefill-ms 8 --adapt"
#   multi-port (shared clock): "--port reactap.11:lan1 --port reactap.12:lan2"
# See `reac-repacer --help` or man reac-repacer(8) for the full option set.
REPACER_ARGS=--port reac-in:reac-out --prefill-ms 8
